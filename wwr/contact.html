<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>About Us | White Water Rafting</title>

    <meta name="description"
        content="Learn about White Water Rafting, our history, mission, and exciting river adventures for families and thrill-seekers.">

    <meta name="author" content="Peter Ella Bisong">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png"
            alt="White Water Rafting Logo"
            class="logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
<main>

    <section class="contact-header">
        <h1>White Water Rafting Company</h1>

        <address>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 (999) 999-9999</p>
            <p>info@whitewater.com</p>
        </address>
    </section>

    <section class="contact-content">

        <div class="map-container">

           <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7953.93773056799!2d-77.86551481456743!3d-4.599599837168578!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x91c98b15273cd6ab%3A0xe76a1abce3d02469!2sSanta%20Mar%C3%ADa%20de%20Nieva%2C%20Peru!5e0!3m2!1sen!2sng!4v1780746064259!5m2!1sen!2sng" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

        </div>

        <form class="contact-form" action="#" method="post">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your name"
                    required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required>
            </div>

            <fieldset>
                <legend>Message Purpose</legend>

                <label>
                    <input type="radio"
                        name="purpose"
                        value="general"
                        required>
                    General Inquiry
                </label>

                <label>
                    <input type="radio"
                        name="purpose"
                        value="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio"
                        name="purpose"
                        value="suggestion">
                    Website Suggestion
                </label>
            </fieldset>

            <div class="form-group">
                <label for="message">Message</label>

                <textarea id="message"
                    name="message"
                    rows="5"
                    placeholder="Type your message here"
                    required></textarea>
            </div>

            <label class="newsletter">
                <input type="checkbox" name="newsletter">
                Please subscribe me to the monthly newsletter
            </label>

            <button type="submit" class="submit-btn">
                Get In Touch!
            </button>

        </form>

    </section>

    <section class="adventures employees">

        <h2>We Are Here to Serve You</h2>

        <div class="adventure-gallery">

            <figure>
                <img src="images/employee_profile1.jpg"
                    alt="Customer Service Representative">
                <figcaption>Employee Profile</figcaption>
            </figure>

            <figure>
                <img src="images/employee_profile2.jpg"
                    alt="Reservations Specialist">
                <figcaption>Employee Profile</figcaption>
            </figure>

            <figure>
                <img src="images/employee_profile3.jpg"
                    alt="River Guide Coordinator">
                <figcaption>Employee Profile</figcaption>
            </figure>

        </div>

    </section>

</main>
 <footer>

        <p>&copy; 2026 White Water Rafting | Peter Ella Bisong</p>

        <nav class="socialmedia">

            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram">
            </a>

        </nav>

    </footer>

</body>

</html>
